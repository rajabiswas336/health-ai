# .streamlit/secrets.toml
# ─────────────────────────────────────────────────────────────────
# LOCAL USE:
#   Create this file at .streamlit/secrets.toml in your project root.
#   This file is read by Streamlit instead of .env when you run locally.
#   Add .streamlit/secrets.toml to your .gitignore — never commit it!
#
# STREAMLIT CLOUD:
#   Go to your app → Settings → Secrets → paste the key=value pairs below.
# ─────────────────────────────────────────────────────────────────

GROQ_API_KEY = "your_groq_api_key_here"
ELEVENLABS_API_KEY = "your_elevenlabs_api_key_here"
